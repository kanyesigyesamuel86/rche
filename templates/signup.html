{% extends 'base.html' %}

{% block content  %}

<div class="form">
    <h1>Sign Up Here</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        {% if error %}
            <p>{{ error }}</p>
        {% endif %}
        <div class="button-container">
            <button type="submit">Signup</button>
        </div>
    </form>
    <a href="{% url 'login_page' %}">Already have an account?</a>
</div>

{% endblock %}
